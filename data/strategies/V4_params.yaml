# 策略名称
name: V4_BTC_100k_March

# 策略描述
description: Trade BTC to exceed $100k by March 2023

market_adapter: polymarket

# 入场条件
entry:
  trigger: "BTC price crosses $100,000 threshold"  # 触发条件描述
  min_liquidity: 10000  # 最小流动性 (USDC)
  max_spread: 0.02  # 最大买卖价差 (5%)
  categories:  # 市场分类过滤
    - crypto

# 仓位管理
position:
  side: "YES"  # 方向: YES 或 NO
  size_usdc: 25  # 单笔下注金额 (USDC)
  max_positions: 3  # 最大同时持仓数
  max_order_size: 20  # 单笔上限 (USDC)
  max_position: 75  # 单市场最大持仓 (USDC)

# 退出条件
exit:
  take_profit: 0.7  # 止盈价格 (YES >= 0.80)
  stop_loss: 0.45  # 止损价格 (YES <= 0.30)
  trailing_stop: 0.15  # 追踪止损 (从高点回撤 10%)
  resolve_redeem: true  # 到期自动赎回

# 风控
risk:
  max_daily_loss: 15  # 当日最大亏损 (USDC)
  max_drawdown: 0.25  # 最大回撤 (30%)
  cooldown_period: 240  # 止损后冷却 (秒)
  kill_switch: true  # 紧急熔断开关

# 运行周期
schedule:
  mode: interval  # interval / cron / manual
  every: 10  # 间隔数值
  unit: minutes  # minutes / hours / days / weeks / months
